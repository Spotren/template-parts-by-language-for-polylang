name: Bug report
description: Report a reproducible problem in the plugin
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce the issue.
  - type: input
    id: wordpress_version
    attributes:
      label: WordPress version
      placeholder: "6.8"
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true
  - type: input
    id: polylang_version
    attributes:
      label: Polylang version
      placeholder: "Example: 3.6"
    validations:
      required: true
  - type: input
    id: theme
    attributes:
      label: Active theme
      placeholder: "Example: Twenty Twenty-Five"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Activate the plugin and Polylang
        2. Open the Site Editor
        3. Edit a template with a Template Part block
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include screenshots, console errors, or relevant configuration if helpful.
